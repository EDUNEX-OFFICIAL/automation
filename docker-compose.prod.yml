# Production overlay: internal edge network + Caddy (ports 80/443).
services:
  postgres:
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: gdms
    networks:
      - edge
    ports: !reset []

  redis:
    container_name: gdms-automation-redis
    networks:
      edge:
        aliases:
          - gdms-automation-redis
          - redis
    ports: !reset []

  api:
    container_name: automation-api
    networks:
      - edge
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/gdms?schema=public
      REDIS_URL: redis://gdms-automation-redis:6379
      JWT_SECRET: ${JWT_SECRET}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      CREDENTIALS_MASTER_KEY: ${CREDENTIALS_MASTER_KEY}
      CORS_ORIGIN: ${CORS_ORIGIN}
      AUTOMATION_INTERNAL_SECRET: ${AUTOMATION_INTERNAL_SECRET}
      AUTOMATION_SERVICE_URL: http://automation:4101
      AI_INTERNAL_SECRET: ${AI_INTERNAL_SECRET}
      AI_SERVICE_URL: http://ai:4200
      VOICE_BRIDGE_ENABLED: "false"
      AUTH_DEV_OPEN_LOGIN: "true"
      NODE_ENV: production
      PORT: 4000
      GDMS_REMOTE_VIEW: ${GDMS_REMOTE_VIEW:-true}
      GDMS_VNC_PASSWORD: ${GDMS_VNC_PASSWORD:-gdms}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  worker:
    container_name: automation-worker
    networks:
      - edge
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/gdms?schema=public
      REDIS_URL: redis://gdms-automation-redis:6379
      CREDENTIALS_MASTER_KEY: ${CREDENTIALS_MASTER_KEY}
      AUTOMATION_SERVICE_URL: http://automation:4101
      AUTOMATION_INTERNAL_SECRET: ${AUTOMATION_INTERNAL_SECRET}
      AI_SERVICE_URL: http://ai:4200
      AI_INTERNAL_SECRET: ${AI_INTERNAL_SECRET}
      GDMS_BASE_URL: https://ndms.hmil.net/cmm/cmmi/selectLoginMain.dms
      GDMS_HOME_URL: https://ndms.hmil.net/cmm/cmmd/selectHome.dms
      NODE_ENV: production

  automation:
    container_name: automation-playwright
    expose:
      - "4101"
      - "6082"
      - "6083"
      - "6084"
      - "6085"
      - "6086"
      - "6087"
      - "6088"
      - "6089"
      - "6090"
      - "6091"
      - "6092"
      - "6093"
      - "6094"
      - "6095"
      - "6096"
      - "6097"
      - "6098"
      - "6099"
      - "6100"
      - "6101"
      - "6102"
      - "6103"
      - "6104"
      - "6105"
      - "6106"
      - "6107"
      - "6108"
      - "6109"
      - "6110"
      - "6111"
      - "6112"
      - "6113"
    networks:
      - edge
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/gdms?schema=public
      REDIS_URL: redis://gdms-automation-redis:6379
      AUTOMATION_INTERNAL_SECRET: ${AUTOMATION_INTERNAL_SECRET}
      GDMS_BASE_URL: https://ndms.hmil.net/cmm/cmmi/selectLoginMain.dms
      GDMS_HOME_URL: https://ndms.hmil.net/cmm/cmmd/selectHome.dms
      SESSIONS_DIR: /data/sessions
      PORT: 4101
      PLAYWRIGHT_HEADED: ${PLAYWRIGHT_HEADED:-true}
      DISPLAY: ${DISPLAY:-:99}
      GDMS_PREVIEW_STREAM: ${GDMS_PREVIEW_STREAM:-true}
      GDMS_REMOTE_VIEW: ${GDMS_REMOTE_VIEW:-true}
      GDMS_VNC_PASSWORD: ${GDMS_VNC_PASSWORD:-gdms}
      GDMS_VNC_WIDTH: ${GDMS_VNC_WIDTH:-1920}
      GDMS_VNC_HEIGHT: ${GDMS_VNC_HEIGHT:-1080}
      GDMS_BOOTSTRAP_COOKIES: ""
      GDMS_FORCE_COOKIE_BOOTSTRAP: "false"
      # Per-item targets: ET ~50s–1m20s, FUS ~30s–1m (GDMS response time extra)
      GDMS_ET_SPEED_MULTIPLIER: "0.32"
      GDMS_FUS_SPEED_MULTIPLIER: "0.28"
      GDMS_SPEED_MULTIPLIER: "0.35"
      GDMS_FOLLOW_UP_SAVE_DELAY_MIN_MS: "300"
      GDMS_FOLLOW_UP_SAVE_DELAY_MAX_MS: "800"
      GDMS_PIN_SEARCH_DELAY_MIN_MS: "600"
      GDMS_PIN_SEARCH_DELAY_MAX_MS: "1200"
      GDMS_SAVE_RETRY_INTERVAL_MS: "2000"
      NODE_ENV: production

  ai:
    container_name: automation-ai
    networks:
      - edge
    ports: !reset []
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/gdms?schema=public
      REDIS_URL: redis://gdms-automation-redis:6379
      AI_INTERNAL_SECRET: ${AI_INTERNAL_SECRET}
      OLLAMA_HOST: http://host.docker.internal:11434
      OLLAMA_MODEL: llama3.2
      NODE_ENV: production
      PORT: 4200
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web:
    container_name: automation-web
    networks:
      - edge
    ports:
      - "3000:3000"
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api-upstream
        NEXT_PUBLIC_SOCKET_URL: https://bot.edunexservices.in
        API_UPSTREAM_URL: http://api:4000
    environment:
      API_UPSTREAM_URL: http://api:4000
      NODE_ENV: production

  caddy:
    image: caddy:2-alpine
    container_name: automation-caddy
    profiles:
      - caddy-edge
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SPYBOTS_UPSTREAM_PORT: ${SPYBOTS_UPSTREAM_PORT:-3003}
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./deploy/caddy/sites.d:/etc/caddy/sites.d:ro
      - ./deploy/caddy/snippets:/etc/caddy/snippets:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - edge
    restart: unless-stopped

networks:
  edge:
    driver: bridge

volumes:
  caddy_data: {}
  caddy_config: {}
