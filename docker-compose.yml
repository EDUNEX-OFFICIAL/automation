services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gdms
    ports:
      - "54322:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/gdms?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev_jwt_secret_replace_me_in_prod_minimum_32_chars
      REFRESH_TOKEN_SECRET: dev_refresh_secret_replace_me_minimum_32ch
      CREDENTIALS_MASTER_KEY: MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE=
      CORS_ORIGIN: http://localhost:3000
      VOICE_BRIDGE_ENABLED: "false"
      AUTOMATION_INTERNAL_SECRET: dev-internal-secret-change-me
      NODE_ENV: production
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/gdms?schema=public
      REDIS_URL: redis://redis:6379
      CREDENTIALS_MASTER_KEY: MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE=
      AUTOMATION_SERVICE_URL: http://automation:4101
      AUTOMATION_INTERNAL_SECRET: dev-internal-secret-change-me
      AI_SERVICE_URL: http://ai:4200
      AI_INTERNAL_SECRET: dev-ai-secret-change-me
      GDMS_BASE_URL: https://ndms.hmil.net/cmm/cmmi/selectLoginMain.dms
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      automation:
        condition: service_healthy

  automation:
    build:
      context: .
      dockerfile: apps/automation-service/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/gdms?schema=public
      REDIS_URL: redis://redis:6379
      GDMS_BASE_URL: https://ndms.hmil.net/cmm/cmmi/selectLoginMain.dms
      SESSIONS_DIR: /data/sessions
      AUTOMATION_INTERNAL_SECRET: dev-internal-secret-change-me
      PORT: 4101
      PLAYWRIGHT_HEADED: "true"
      DISPLAY: ":99"
    volumes:
      - sessions:/data/sessions
    depends_on:
      - postgres
      - redis
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:4101/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 45s

  ai:
    build:
      context: .
      dockerfile: apps/ai-service/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/gdms?schema=public
      REDIS_URL: redis://redis:6379
      OLLAMA_HOST: http://host.docker.internal:11434
      AI_INTERNAL_SECRET: dev-ai-secret-change-me
    ports:
      - "4200:4200"
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata: {}
  sessions: {}
